<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#41618A" />
<title>Finding Aids — TARO</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/taro.css" />
</head>
<body>
<header class="masthead" data-masthead></header>

<main class="wrap page">
  <nav class="crumbs" aria-label="Breadcrumb">
    <a href="index.html">Repositories</a><span class="sep">/</span><span id="crumbName">&#8230;</span>
  </nav>

  <div class="pagehead">
    <h1 id="repoTitle">Loading&#8230;</h1>
    <p class="count" id="repoSub"></p>
  </div>

  <div class="toolbar" id="toolbar" hidden>
    <div class="find">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="find" type="search" placeholder="Search the full text of this repository&#8217;s finding aids&#8230;" aria-label="Search this repository" autocomplete="off" />
    </div>
    <label>Sort
      <select id="sort">
        <option value="title">Title (A&#8211;Z)</option>
        <option value="title-desc">Title (Z&#8211;A)</option>
        <option value="date-asc">Date (earliest)</option>
        <option value="date-desc">Date (latest)</option>
      </select>
    </label>
    <label style="display:flex"><input type="checkbox" id="digiOnly" /> Digitized only</label>
    <span class="ctrl-count" id="listCount"></span>
  </div>

  <div id="list" aria-live="polite"></div>
</main>

<footer class="site-foot" data-footer></footer>

<script type="module">
import {
  loadRepositories, loadRepoAids, liveSearchInRepo, aidHref, lastDate, lastExtent,
  esc, debounce, mountMasthead, mountFooter
} from "./assets/site.js";

mountMasthead();
mountFooter();

const slug = new URLSearchParams(location.search).get("repo") || "";

const crumbName = document.getElementById("crumbName");
const repoTitle = document.getElementById("repoTitle");
const repoSub = document.getElementById("repoSub");
const toolbar = document.getElementById("toolbar");
const listEl = document.getElementById("list");
const findEl = document.getElementById("find");
const sortEl = document.getElementById("sort");
const digiEl = document.getElementById("digiOnly");
const countEl = document.getElementById("listCount");

let name = slug;
let allAids = [];     // full browse list (one Search API call)
let view = [];        // currently displayed set (browse list or search results)
let mode = "browse";  // "browse" | "search"

function dateKey(rec){ const m = (lastDate(rec).match(/\d{4}/) || [])[0]; return m ? parseInt(m,10) : 0; }

function row(rec){
  const dates = lastDate(rec);
  const creator = rec.creators[0] || "";
  const ext = lastExtent(rec);
  return `<div class="aid-row">
    <h2 class="atitle"><a href="${aidHref(rec)}">${esc(rec.title)}</a></h2>
    ${rec.abstract ? `<p class="aabs">${esc(rec.abstract)}</p>` : ""}
    <div class="ameta">
      ${dates ? `<span class="dates">${esc(dates)}</span>` : ""}
      ${creator ? `<span class="pill">${esc(creator)}</span>` : ""}
      ${ext ? `<span class="pill">${esc(ext)}</span>` : ""}
      ${rec.digital ? `<span class="pill digi">Digitized</span>` : ""}
    </div>
    <a class="open" href="${aidHref(rec)}">Open finding aid &#8594;</a>
  </div>`;
}

function applyControls(arr){
  let v = digiEl.checked ? arr.filter(r => r.digital) : arr.slice();
  const s = sortEl.value;
  v.sort((a,b)=>{
    if (s === "title") return a.title.localeCompare(b.title);
    if (s === "title-desc") return b.title.localeCompare(a.title);
    if (s === "date-asc") return dateKey(a) - dateKey(b);
    if (s === "date-desc") return dateKey(b) - dateKey(a);
    return 0;
  });
  return v;
}

function render(){
  const v = applyControls(view);
  listEl.className = "aid-list";
  listEl.innerHTML = v.length
    ? v.map(row).join("")
    : `<div class="state"><h2>${mode==="search" ? "No matches" : "No finding aids"}</h2><p>Try a different word${mode==="search" ? "" : " or clear the filters"}.</p></div>`;
  const total = view.length;
  countEl.textContent = v.length === total ? `${total} ${mode==="search"?"result"+(total===1?"":"s"):"finding aids"}` : `${v.length} of ${total}`;
}

const runSearch = debounce(async () => {
  const q = findEl.value.trim();
  if (!q){ mode = "browse"; view = allAids; repoSub.textContent = subFor(allAids.length, "browse"); render(); return; }
  mode = "search";
  listEl.className = "";
  listEl.innerHTML = `<div class="state"><div class="spinner"></div>Searching ${esc(name)}&#8230;</div>`;
  try {
    view = await liveSearchInRepo(slug, q);
    repoSub.textContent = `${view.length} result${view.length===1?"":"s"} for &#8220;${esc(q)}&#8221;`.replace(/&[^;]+;/g, m=>({"&#8220;":"\u201c","&#8221;":"\u201d"}[m]||m));
    render();
  } catch (e) {
    listEl.className = "";
    listEl.innerHTML = `<div class="state error"><h2>Search didn’t complete</h2><p>${esc(String(e.message||e))}</p></div>`;
  }
}, 320);

function subFor(n, m){ return `${n} finding aid${n===1?"":"s"}`; }

findEl.addEventListener("input", runSearch);
sortEl.addEventListener("change", render);
digiEl.addEventListener("change", render);

(async () => {
  if (!slug){
    repoTitle.textContent = "No repository specified";
    listEl.innerHTML = `<div class="state error"><h2>Missing repository</h2><p>Open this page from the <a href="index.html">repository directory</a>.</p></div>`;
    return;
  }
  try {
    const { repositories } = await loadRepositories();
    const found = repositories.find(r => r.slug === slug);
    if (found) name = found.name;
  } catch(_){}
  crumbName.textContent = name;
  repoTitle.textContent = name;
  document.title = `${name} — TARO`;

  listEl.innerHTML = `<div class="state"><div class="spinner"></div>Loading finding aids&#8230;</div>`;
  try {
    const res = await loadRepoAids(slug, { repoName: name });
    allAids = res.aids;
    view = allAids;
    if (!allAids.length){
      repoSub.textContent = "";
      listEl.className = "";
      listEl.innerHTML = `<div class="state"><h2>No finding aids found</h2><p>This repository has no published finding aids, or none could be retrieved. You can browse it on <a href="https://txarchives.org/${esc(slug)}" rel="noopener">TARO</a>.</p></div>`;
      return;
    }
    toolbar.hidden = false;
    repoSub.textContent = subFor(allAids.length, "browse") + (res.source === "cached" ? " · from saved snapshot" : "");
    render();
  } catch (e) {
    listEl.className = "";
    listEl.innerHTML = `<div class="state error">
      <h2>Couldn’t load this repository’s finding aids</h2>
      <p>A live request to TARO didn’t succeed (${esc(String(e.message || e))}).</p>
      <p style="margin-top:12px"><a href="https://txarchives.org/${esc(slug)}" rel="noopener">Browse ${esc(name)} on TARO →</a></p>
    </div>`;
  }
})();
</script>
</body>
</html>
